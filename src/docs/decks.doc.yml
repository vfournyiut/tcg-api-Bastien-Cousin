paths:
  /api/decks:
    post:
      tags:
        - Decks
      summary: Créer un nouveau deck
      description: Crée un nouveau deck pour l'utilisateur authentifié. Le deck doit contenir exactement 10 cartes Pokémon avec des numéros pokédex valides.
      operationId: createDeck
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - cards
              properties:
                name:
                  type: string
                  description: Nom du deck à créer
                  example: "Deck Légendaires"
                cards:
                  type: array
                  description: Tableau de 10 numéros pokédex valides (entre 1 et max disponible)
                  items:
                    type: integer
                  minItems: 10
                  maxItems: 10
                  example: [1, 4, 7, 25, 39, 52, 58, 69, 77, 100]
      responses:
        '201':
          description: Deck créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck créé avec succès"
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          description: Validation échouée (nom manquant, pas 10 cartes, ou IDs invalides)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/decks/mine:
    get:
      tags:
        - Decks
      summary: Obtenir tous mes decks
      description: Récupère tous les decks de l'utilisateur authentifié avec leurs cartes associées. Retourne un tableau vide si l'utilisateur n'a pas encore de decks.
      operationId: getMyDecks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Decks récupérés avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Decks récupérés avec succès"
                  decks:
                    type: array
                    description: Tableau de tous les decks de l'utilisateur
                    items:
                      $ref: '#/components/schemas/Deck'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/decks/{id}:
    get:
      tags:
        - Decks
      summary: Obtenir un deck spécifique
      description: Récupère un deck spécifique de l'utilisateur authentifié par son ID avec toutes ses cartes associées. Seul le propriétaire du deck peut le consulter.
      operationId: getDeckById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID du deck à récupérer
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Deck récupéré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck récupéré avec succès"
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "Deck Légendaires"
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  userId:
                    type: integer
                    example: 1
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Le deck n'appartient pas à l'utilisateur authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - Le deck avec cet ID n'existe pas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags:
        - Decks
      summary: Modifier un deck existant
      description: Met à jour un deck existant (son nom et/ou ses cartes). Le deck doit toujours contenir exactement 10 cartes. Les anciennes associations de cartes seront supprimées et remplacées par les nouvelles.
      operationId: updateDeck
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID du deck à modifier
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - modifiedCards
              properties:
                name:
                  type: string
                  description: Nouveau nom du deck (optionnel, mais ne peut pas être vide)
                  example: "Nouveau Nom du Deck"
                modifiedCards:
                  type: array
                  description: Nouveau tableau de 10 numéros pokédex pour remplacer les cartes
                  items:
                    type: integer
                  minItems: 10
                  maxItems: 10
                  example: [3, 6, 9, 25, 38, 50, 56, 68, 75, 115]
      responses:
        '200':
          description: Deck modifié avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck modifié avec succès"
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "Nouveau Nom du Deck"
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  userId:
                    type: integer
                    example: 1
        '400':
          description: Validation échouée (pas 10 cartes ou IDs invalides)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Le deck n'appartient pas à l'utilisateur authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - Le deck avec cet ID n'existe pas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Decks
      summary: Supprimer un deck
      description: Supprime un deck existant et toutes ses associations de cartes. Cette opération est irréversible. Seul le propriétaire peut supprimer son deck.
      operationId: deleteDeck
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID du deck à supprimer
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Deck supprimé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck supprimé avec succès"
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "Nom du deck supprimé"
                  userId:
                    type: integer
                    example: 1
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Le deck n'appartient pas à l'utilisateur authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - Le deck avec cet ID n'existe pas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
